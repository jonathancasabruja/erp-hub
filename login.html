<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Casa Bruja Hub · Ingresar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f1115;
        --card: #1f232c;
        --border: #2a2f3a;
        --text: #e6e9ef;
        --text-dim: #9aa3b2;
        --accent: #f59e0b;
        --accent-hover: #fbbf24;
        --error: #ef4444;
        --input-bg: #161922;
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 32px 28px;
        width: 100%;
        max-width: 360px;
      }
      .brand {
        font-size: 12px;
        letter-spacing: 0.2em;
        color: var(--accent);
        text-transform: uppercase;
        text-align: center;
        margin-bottom: 8px;
      }
      h1 {
        text-align: center;
        margin: 0 0 6px;
        font-size: 26px;
        font-weight: 700;
      }
      .sub {
        text-align: center;
        color: var(--text-dim);
        font-size: 14px;
        margin: 0 0 22px;
      }
      label {
        display: block;
        font-size: 12px;
        color: var(--text-dim);
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        background: var(--input-bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-size: 14px;
        font-family: inherit;
      }
      input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 0;
      }
      button {
        width: 100%;
        padding: 11px;
        margin-top: 16px;
        background: var(--accent);
        color: #1a1500;
        border: none;
        border-radius: 8px;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: var(--accent-hover);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .error {
        color: var(--error);
        font-size: 13px;
        margin-top: 10px;
        text-align: center;
        min-height: 18px;
      }
      .field {
        margin-bottom: 14px;
      }
    </style>
  </head>
  <body>
    <form class="card" id="loginForm">
      <div class="brand">Casa Bruja</div>
      <h1>Hub</h1>
      <p class="sub">Ingrese correo y contraseña</p>
      <div class="field">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="usuario@casabruja.com" autofocus />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <div class="error" id="error"></div>
      <button type="submit" id="submit">Entrar</button>
      <div class="legacy">
        <a href="#" id="legacyToggle">Entrar con contraseña maestra (sin correo)</a>
      </div>
    </form>
    <style>
      .legacy {
        margin-top: 14px;
        text-align: center;
      }
      .legacy a {
        color: var(--text-dim);
        font-size: 12px;
        text-decoration: underline;
        cursor: pointer;
      }
      .legacy a:hover { color: var(--text); }
    </style>
    <script>
      const form = document.getElementById("loginForm");
      const submit = document.getElementById("submit");
      const errorEl = document.getElementById("error");
      const emailInput = document.getElementById("email");
      const legacyToggle = document.getElementById("legacyToggle");
      let legacyMode = false;

      legacyToggle.addEventListener("click", (e) => {
        e.preventDefault();
        legacyMode = !legacyMode;
        if (legacyMode) {
          emailInput.type = "text";
          emailInput.placeholder = "Nombre (opcional)";
          emailInput.required = false;
          emailInput.value = "";
          document.querySelector('label[for=email]').textContent = "Nombre (opcional)";
          legacyToggle.textContent = "Volver a inicio de sesión normal";
          document.querySelector(".sub").textContent = "Modo administrador legacy";
        } else {
          emailInput.type = "email";
          emailInput.placeholder = "usuario@casabruja.com";
          emailInput.required = true;
          emailInput.value = "";
          document.querySelector('label[for=email]').textContent = "Correo";
          legacyToggle.textContent = "Entrar con contraseña maestra (sin correo)";
          document.querySelector(".sub").textContent = "Ingrese correo y contraseña";
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.textContent = "";
        submit.disabled = true;
        submit.textContent = "Ingresando...";
        const val = emailInput.value.trim();
        const password = document.getElementById("password").value;
        const body = legacyMode
          ? { name: val || "Admin", password }
          : { email: val, password };
        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify(body),
          });
          const data = await res.json();
          if (!res.ok) {
            errorEl.textContent = data.error || "Error de autenticación";
            submit.disabled = false;
            submit.textContent = "Entrar";
            return;
          }
          // If must_change flag is set, redirect to password change
          if (data?.user?.mustChange) {
            window.location.href = "/?first-login=1";
          } else {
            window.location.href = "/";
          }
        } catch (err) {
          errorEl.textContent = "Error de conexión";
          submit.disabled = false;
          submit.textContent = "Entrar";
        }
      });
    </script>
  </body>
</html>
