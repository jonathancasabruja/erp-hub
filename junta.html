<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Casa Bruja · Sala de Junta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0e14;
        --bg-soft: #141922;
        --card: #1b2130;
        --border: #2a3346;
        --text: #f0f4fa;
        --text-dim: #8b95a8;
        --accent: #f59e0b;
        --gold: #fbbf24;
        --green: #34d399;
        --cyan: #38bdf8;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }
      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 56px 32px 96px;
      }
      .brand {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--gold);
        margin-bottom: 8px;
      }
      .title {
        font-size: 44px;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin: 0 0 12px;
        line-height: 1.1;
      }
      .updated {
        color: var(--text-dim);
        font-size: 12px;
        margin-bottom: 48px;
      }
      section {
        margin-bottom: 48px;
      }
      section h2 {
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
        margin: 0 0 16px;
      }
      .prose {
        font-size: 16px;
        line-height: 1.7;
        color: var(--text);
        white-space: pre-wrap;
      }
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
      }
      .kpi-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 22px;
      }
      .kpi-card .label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }
      .kpi-card .value {
        font-family: "IBM Plex Mono", monospace;
        font-size: 32px;
        font-weight: 700;
        margin-top: 6px;
        letter-spacing: -0.02em;
      }
      .kpi-card .sub {
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 2px;
      }
      .value.gold { color: var(--gold); }
      .value.cyan { color: var(--cyan); }
      .value.green { color: var(--green); }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      th {
        text-align: left;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-soft);
      }
      td {
        padding: 10px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 14px;
      }
      tr:last-child td { border-bottom: none; }
      .num {
        font-family: "IBM Plex Mono", monospace;
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      footer {
        margin-top: 72px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
        text-align: center;
        color: var(--text-dim);
        font-size: 12px;
      }
      .error, .loading {
        padding: 48px;
        text-align: center;
        color: var(--text-dim);
      }
      .error strong { color: var(--gold); }
      @media (max-width: 700px) {
        .title { font-size: 30px; }
        .wrap { padding: 32px 18px; }
      }
    </style>
  </head>
  <body>
    <div id="root" class="wrap">
      <div class="loading">Cargando…</div>
    </div>
    <script>
      const token = window.location.pathname.split("/").pop().replace(/\/$/, "");
      const money = (n) =>
        "$" + (n || 0).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      function escapeHtml(s) {
        return String(s ?? "")
          .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
      }
      function asParagraphs(text) {
        const trimmed = (text || "").trim();
        if (!trimmed) return "";
        return '<div class="prose">' + escapeHtml(trimmed) + "</div>";
      }
      async function load() {
        const root = document.getElementById("root");
        try {
          const r = await fetch(`/api/junta/${token}`);
          if (!r.ok) {
            root.innerHTML = '<div class="error"><strong>Link inválido o expirado.</strong><br />Pide a Jonathan un link nuevo.</div>';
            return;
          }
          const data = await r.json();
          const c = data.content || {};
          const title = c.title || "Sala de Junta — Casa Bruja";
          const updated = data.updatedAt ? new Date(data.updatedAt).toLocaleString("es-PA") : "—";

          const sales = data.sales;
          const po = data.po;

          const kpiCards = sales
            ? `
              <div class="kpi-grid">
                <div class="kpi-card">
                  <div class="label">Ventas este mes</div>
                  <div class="value gold">${money(sales.mtd?.total)}</div>
                  <div class="sub">${sales.mtd?.invoices || 0} facturas</div>
                </div>
                <div class="kpi-card">
                  <div class="label">Distribución MTD</div>
                  <div class="value cyan">${money(sales.mtd?.distribucion)}</div>
                </div>
                <div class="kpi-card">
                  <div class="label">Taproom MTD</div>
                  <div class="value green">${money(sales.mtd?.taproom)}</div>
                </div>
                <div class="kpi-card">
                  <div class="label">Ventas año en curso</div>
                  <div class="value gold">${money(sales.ytd?.total)}</div>
                  <div class="sub">${sales.ytd?.invoices || 0} facturas</div>
                </div>
                <div class="kpi-card">
                  <div class="label">Clientes activos YTD</div>
                  <div class="value">${sales.customersThisYear || 0}</div>
                </div>
              </div>
            `
            : "";

          const topCustomersTable =
            sales?.topCustomersThisMonth?.length > 0
              ? `
              <table>
                <thead>
                  <tr>
                    <th>Cliente</th>
                    <th class="num">Facturas</th>
                    <th class="num">Revenue</th>
                  </tr>
                </thead>
                <tbody>
                  ${sales.topCustomersThisMonth
                    .slice(0, 10)
                    .map(
                      (r) => `
                    <tr>
                      <td><strong>${escapeHtml(r.name || r.customer_code)}</strong></td>
                      <td class="num">${r.invoices}</td>
                      <td class="num"><strong>${money(r.revenue)}</strong></td>
                    </tr>
                  `
                    )
                    .join("")}
                </tbody>
              </table>
            `
              : "";

          root.innerHTML = `
            <div class="brand">Casa Bruja</div>
            <h1 class="title">${escapeHtml(title)}</h1>
            <div class="updated">Actualizado: ${escapeHtml(updated)}</div>

            ${c.summary ? `<section><h2>Resumen</h2>${asParagraphs(c.summary)}</section>` : ""}

            ${c.agenda ? `<section><h2>Agenda</h2>${asParagraphs(c.agenda)}</section>` : ""}

            ${kpiCards ? `<section><h2>KPIs en vivo</h2>${kpiCards}</section>` : ""}

            ${c.kpiCommentary ? `<section><h2>Comentarios</h2>${asParagraphs(c.kpiCommentary)}</section>` : ""}

            ${topCustomersTable ? `<section><h2>Top clientes este mes</h2>${topCustomersTable}</section>` : ""}

            ${c.notes ? `<section><h2>Notas</h2>${asParagraphs(c.notes)}</section>` : ""}

            <footer>
              Casa Bruja · Panamá · Datos en vivo desde el ERP
            </footer>
          `;
        } catch (err) {
          console.error(err);
          root.innerHTML = '<div class="error"><strong>No se pudo cargar la página.</strong><br />' + escapeHtml(err.message) + "</div>";
        }
      }
      load();
    </script>
  </body>
</html>
